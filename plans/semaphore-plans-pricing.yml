  - name: Basic
    price: 50.00
    currency: USD
    billing: monthly
    description: Email support during business hours
  - name: Priority Response
    price: 250.00
    currency: USD
    billing: monthly
    description: Email and Slack support, 24/5 availability
  - name: SLA Standard
    price: 500.00
    currency: USD
    billing: monthly
    description: 24/5 support with guaranteed response times
  - name: SLA Premium
    price: 750.00
    currency: USD
    billing: monthly
