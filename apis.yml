aid: semaphore
name: Semaphore
description: >-
  Semaphore is a cloud-based CI/CD platform designed for high-performance
  engineering teams, providing fast and reliable continuous integration and
  continuous delivery pipelines. The platform offers a comprehensive REST API
  that enables programmatic management of pipelines, workflows, jobs, secrets,
  projects, and deployment targets for software delivery automation. Semaphore
  supports OAS 3.0-compliant API definitions with Swagger documentation,
  covering resources such as artifacts, test results, self-hosted agents, and
  build insights. Teams can use the API to integrate with external tools, build
  custom interfaces, trigger promotions, and automate their entire software
  delivery lifecycle.
