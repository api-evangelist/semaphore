apis:
  - aid: semaphore:semaphore-api
    name: Semaphore API
    description: >-
      The Semaphore REST API provides programmatic access to all platform
      resources including workflows, pipelines, jobs, promotions, deployment
      targets, self-hosted agents, artifacts, and test results. The API follows
      RESTful principles with OAS 3.0 compliance, uses token-based
      authentication, and returns JSON responses. It supports operations for
      managing CI/CD pipelines and build artifacts at the organization level.
