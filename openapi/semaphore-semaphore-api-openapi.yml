                      id:
                        description: ID of a Dashboard
                        example: 645d2d5b-603c-49b2-9022-594297b60aa1
                        format: uuid
                        title: Dashboard.ID
                        type: string
                      name:
                        description: Dashboard name must match the regex
                        example: my-dashboard
                        minLength: 1
                        pattern: \A(?!-)[a-z0-9\-]+\z
                        title: Dashboards.Name
                        type: string
                      org_id:
                        description: ID of a Organization
                        example: a44db728-f627-4560-a548-9f61d61e8780
                        format: uuid
                        title: Organization.ID
                        type: string
                      title:
                        description: Title of the dashboard
                        type: string
                      updated_at:
                        description: Timestamp in ISO 8601 format
                        format: date-time
                        title: Timestamp
                        type: string
                    readOnly: true
                    required:
                    - id
                    - name
                    type: object
                  spec:
