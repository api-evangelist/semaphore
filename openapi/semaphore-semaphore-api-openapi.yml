      security:
      - authorization: []
    get:
      operationId: Dashboards.List
      description: "List all organization level dashboards.\n      If the response does not fit all the dashboards refer to\
        \ the link header to get next page url."
      tags:
      - Dashboards
      parameters:
      - description: Ordering of the dashboards
        in: query
        name: order
        required: false
