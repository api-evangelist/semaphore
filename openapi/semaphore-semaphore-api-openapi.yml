        schema:
          format: date-time
          type: string
      - description: Return only workflows with given label (label is branch/tag name, PR number, snapshot generated label
          etc.)
        example: v2
        in: query
        name: label
        required: false
        schema:
          type: string
      - description: Type of git reference for which workflow is initiated.
        example: BRANCH
        in: query
        name: git_ref_type
        required: false
        schema:
          enum:
          - BRANCH
          - TAG
          - PR
          type: string
      - description: Direction of the list from the provided token
        in: query
        name: direction
        required: false
        schema:
          default: NEXT
          description: "Use NEXT with value of next_page_token to get next page of results,\n              use PREVIOUS with\
            \ value of previous_page_token to get previous page of results."
          enum:
          - NEXT
          - PREVIOUS
          type: string
      - description: Starting point for listing, if you are fetching first page leave it empty
        in: query
        name: page_token
        required: false
        schema:
          default: ''
          type: string
      - description: Page size
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          title: PageSize
          type: integer
