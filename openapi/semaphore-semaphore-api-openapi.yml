  /pipelines/{pipeline_id}:
    get:
      operationId: Pipelines.Describe
      description: Describe a pipeline using pipeline_id
      tags:
      - Pipelines
      parameters:
      - description: Id of the pipeline
        in: path
        name: pipeline_id
        required: true
        schema:
          format: uuid
          type: string
      - description: "Option to include all information about all blocks and jobs.\n           This option is much more expensive--if\
          \ you are only interested in the status of a pipeline, don't set detailed to true."
        in: query
        name: detailed
        required: false
        schema:
